name: Publish documentation 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v3
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: echo "Start"
      - name: Check public OpenAPI specification
        run: npm run check:openapi-public
      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Build documentation
        run: python -m mkdocs build --strict
      - name: Smoke-test Swagger UI output
        run: |
          test -f site/developers/server-api/index.html
          test -f site/developers/crm-server-openapi-public.json
          test ! -f site/developers/crm-server-openapi.json
          test -f site/assets/swagger-ui/oauth2-redirect.html
          grep -q 'swagger-ui-iframe' site/developers/server-api/index.html
          grep -q 'var url = "../crm-server-openapi-public.json"' site/developers/server-api/swagger-*.html
          grep -q '"supportedSubmitMethods": \[\]' site/developers/server-api/swagger-*.html
          ! grep -q '"name": "MCP"' site/developers/crm-server-openapi-public.json
          ! grep -q '"name": "Google Integrations"' site/developers/crm-server-openapi-public.json
          ! grep -q '"name": "Pipedrive"' site/developers/crm-server-openapi-public.json
      - name: Deploy documentation
        if: github.event_name == 'push'
        run: python -m mkdocs gh-deploy --strict --force
