name: Publish Core Package

on:
  push:
    tags:
      - '1.7.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --replace-registry-host=always

      - name: Verify package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p "require('./packages/core/package.json').version")"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match @app-connect/core version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Publish @app-connect/core
        run: npm publish --workspace=@app-connect/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
