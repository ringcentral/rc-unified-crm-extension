name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --replace-registry-host=always

      - name: Run tests
        run: npm run test-coverage
        env:
          NODE_ENV: test

      - name: Upload server root coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          name: server-root
          flags: server-root
          fail_ci_if_error: true

      - name: Upload server core coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage/lcov.info
          working-directory: ./packages/core
          name: server-core
          flags: server-core
          fail_ci_if_error: true

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test

