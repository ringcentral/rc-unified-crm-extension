# Project information
site_name: App Connect for RingEX
site_url: https://appconnect.labs.ringcentral.com

# Repository
#repo_url: https://github.com/ringcentral/rc-unified-crm-extension
#repo_name: ringcentral/rc-unified-crm-extension
edit_uri: https://github.com/ringcentral/rc-unified-crm-extension/tree/master/docs
docs_dir: docs

not_in_nav: |
  crm/agencyzoom/gate6.md
  crm/agencyzoom/aa.md

theme:
  name: material
  logo: img/RingCentral_logo_color.png
  custom_dir: overrides
  font:
    text: Inter Tight
    code: Roboto Mono
  features:
      - navigation.path
      - navigation.sections
      - navigation.expand
      - navigation.tabs
      - navigation.tabs.sticky
      - search.sharing
      - search.highlight
  palette:
    - scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode

plugins:
  - material-ringcentral
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
#  - badges
  - exclude:
      regex:
        - '^\.#.*'
        - '.*\.\#.*$'
      glob:
        - crm/jobadder.md
        - solutions/solutions-footer.md
        - build.md
  - print-site

hooks:
  - scripts/mkdocs/hooks/shortcodes.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ringcentral
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/ringcentraldevs
extra_css:
  - extra.css
extra_javascript:
  - extra.js

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.snippets:
      base_path: ['.']
  - pymdownx.superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
       emoji_index: !!python/name:material.extensions.emoji.twemoji
       emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "2023-2026 RingCentral, Inc. All rights reserved."

