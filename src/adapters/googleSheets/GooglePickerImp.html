<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Google Picker API Example</title>
</head>

<body>
    <button id="authorize_button" onclick="handleAuthClick()">Authorize</button>
    <button id="signout_button" onclick="handleSignoutClick()" style="display:none;">Sign Out</button>
    <button id="picker_button" onclick="createPicker()" style="display:none;">Show Picker</button>

    <div id="content"></div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const CLIENT_ID = '1027442773593-a4v5oq4dqeu0ftqug0vsiqhi8k57ur24.apps.googleusercontent.com';
        const key = 'AIzaSyAEzVJN43R2C5PTrDq2GwPOBB7MsK0O8co';
        const project_id = '1027442773593';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let accessToken = null;
        let pickerInited = false;
        let gisInited = false;
        let tokenClient;

        function gapiLoaded() {
            gapi.load('client:picker', initializePicker);
        }

        async function initializePicker() {
            await gapi.client.load('https://www.googleapis.com/drive/v3');
            pickerInited = true;
            enableAuthorizeButton();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (response) => {
                    if (response.error) {
                        console.error('Auth Error:', response);
                        return;
                    }
                    accessToken = response.access_token;
                    document.getElementById('signout_button').style.display = 'inline';
                    document.getElementById('picker_button').style.display = 'inline';
                    document.getElementById('authorize_button').innerText = 'Refresh';
                }
            });
            gisInited = true;
            enableAuthorizeButton();
        }

        function enableAuthorizeButton() {
            if (pickerInited && gisInited) {
                document.getElementById('authorize_button').style.display = 'inline';
            }
        }

        function handleAuthClick() {
            if (!accessToken) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                createPicker();
            }
        }

        function handleSignoutClick() {
            google.accounts.oauth2.revoke(accessToken);
            accessToken = null;
            document.getElementById('authorize_button').innerText = 'Authorize';
            document.getElementById('signout_button').style.display = 'none';
            document.getElementById('picker_button').style.display = 'none';
            document.getElementById('content').innerText = '';
        }

        function createPicker() {
            console.log({ accessToken });
            if (!accessToken) {
                console.error('Access token not available.');
                return;
            }

            const view = new google.picker.View(google.picker.ViewId.SPREADSHEETS);
            // view.setMimeTypes('application/pdf,image/jpeg,image/png');
            view.setMimeTypes('application/vnd.google-apps.spreadsheet');

            // const picker = new google.picker.PickerBuilder()
            //     .setOAuthToken(accessToken)
            //     .setDeveloperKey(API_KEY)
            //     .setAppId(APP_ID)
            //     .addView(view)
            //     .setCallback(pickerCallback)
            //     .build();
            console.log({ accessToken, key, project_id });
            const picker = new google.picker.PickerBuilder()
                .enableFeature(google.picker.Feature.NAV_HIDDEN)
                .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                .setAppId(project_id)
                .setOAuthToken(accessToken)
                .addView(view)
                .addView(new google.picker.DocsUploadView())
                .setDeveloperKey(key)
                .setCallback(pickerCallback)
                .build();
            picker.setVisible(true);
        }

        function pickerCallback(data) {
            console.log({ data });
            if (data.action === google.picker.Action.PICKED) {
                //const document = data[google.picker.Response.DOCUMENTS][0];
                //document.getElementById('content').innerText = `Selected File: ${document[google.picker.Document.NAME]}`;
                const field = data.docs[0].id;
                alert("User selected " + field);
            }
        }
    </script>

    <!-- Load Google APIs -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>

</html>
